<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Fit Log</title>
  <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
  <style>
    .container {
        max-width: 720px;
        margin-top: 100px;
    }

    .main-box {
        padding: 48px;
        border: 1px solid #e5e5e5;
        border-radius: 16px;
        text-align: center;
    }

    .main-title {
        font-size: 36px;
        font-weight: 700;
    }

    .main-description {
        margin-top: 16px;
        color: #666;
    }

    .button-group {
        margin-top: 32px;
        display: flex;
        gap: 12px;
        justify-content: center;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="main-box">
    <h1 class="main-title">Fit Log</h1>

    <p class="main-description">
      운동 기록과 생각을 남기는 개인 운동 기록 서비스입니다.
    </p>

    <div class="button-group">
      <a class="btn btn-primary btn-lg" th:href="@{/posts}">
        게시물 목록
      </a>

      <a class="btn btn-outline-primary btn-lg" th:href="@{/post/add}">
        게시물 작성
      </a>

      <a class="btn btn-outline-secondary btn-lg" th:href="@{/login}">
        로그인
      </a>
    </div>
  </div>
</div>

</body>
</html>
