<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>게시물 상세</title>
  <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
  <style>
    .container {
        max-width: 720px;
        margin-top: 60px;
    }

    .content-box {
        min-height: 200px;
        padding: 24px;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        white-space: pre-wrap;
    }
  </style>
</head>
<body>

<div class="container">
  <h2 th:text="${post.title}">게시물 제목</h2>

  <div class="text-muted mb-3">
    <span th:text="${post.createdAT}">2026-05-27</span>
  </div>

  <div class="content-box" th:text="${post.content}">
    게시물 내용
  </div>

  <div class="mt-4 d-flex gap-2">
    <a class="btn btn-secondary" th:href="@{/posts}">
      목록
    </a>

    <a class="btn btn-outline-primary"
       th:href="@{/posts/edit/{postId}(postId=${post.id})}">
      수정
    </a>

    <form th:action="@{/posts/delete/{postId}(postId=${post.id})}" method="post">
      <button class="btn btn-outline-danger" type="submit">
        삭제
      </button>
    </form>
  </div>
</div>

</body>
</html>
