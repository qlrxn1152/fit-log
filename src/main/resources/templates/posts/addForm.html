<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>게시물 작성</title>
  <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
  <style>
    .container {
        max-width: 720px;
        margin-top: 60px;
    }

    .field-error {
        color: #dc3545;
        font-size: 14px;
    }

    .form-control.field-error {
        border-color: #dc3545;
    }
  </style>
</head>
<body>

<div class="container">
  <h2 class="mb-4">게시물 작성</h2>

  <form th:action="@{/posts/add}" th:object="${postForm}" method="post">

    <div class="mb-3">
      <label for="title" class="form-label">제목</label>
      <input type="text"
             id="title"
             th:field="*{title}"
             th:errorclass="field-error"
             class="form-control"
             placeholder="제목을 입력하세요">

      <div class="field-error" th:errors="*{title}">
        제목 오류
      </div>
    </div>

    <div class="mb-3">
      <label for="content" class="form-label">내용</label>
      <textarea id="content"
                th:field="*{content}"
                th:errorclass="field-error"
                class="form-control"
                rows="8"
                placeholder="내용을 입력하세요"></textarea>

      <div class="field-error" th:errors="*{content}">
        내용 오류
      </div>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit">
        등록
      </button>

      <a class="btn btn-secondary" th:href="@{/posts}">
        취소
      </a>
    </div>
  </form>
</div>

</body>
</html>
