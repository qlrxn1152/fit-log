<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>게시물 목록</title>
  <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
  <style>
    .container {
        max-width: 900px;
        margin-top: 60px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>게시물 목록</h2>

    <a class="btn btn-primary" th:href="@{/posts/add}">
      게시물 작성
    </a>
  </div>

  <table class="table table-hover">
    <thead>
    <tr>
      <th>번호</th>
      <th>제목</th>
      <th>작성일</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="post : ${posts}">
      <td th:text="${post.id}">1</td>
      <td>
        <a th:href="@{/posts/{postId}(postId=${post.id})}"
           th:text="${post.title}">
          오늘의 운동 기록
        </a>
      </td>
      <td th:text="${post.createdAt}">2026-05-27</td>
    </tr>
    </tbody>
  </table>

  <a class="btn btn-secondary" th:href="@{/}">
    홈으로
  </a>
</div>

</body>
</html>
